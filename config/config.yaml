# AI Intelligence Agent - Configuration

schedule:
  day: monday
  hour: 8

database:
  path: "data/news.db"

sources:
  rss:
    enabled: true
    max_age_days: 7    # Skip articles older than this — prevents ingesting entire feed archives
    feeds:
      - name: "OpenAI"
        url: "https://openai.com/news/rss.xml"
        category: "company"
      - name: "Anthropic"
        # Anthropic has no official RSS feed. This is a community-maintained
        # mirror (GitHub Actions scrapes anthropic.com/news daily).
        url: "https://raw.githubusercontent.com/taobojlen/anthropic-rss-feed/main/anthropic_news_rss.xml"
        category: "company"
      - name: "Google DeepMind"
        url: "https://deepmind.google/blog/rss.xml"
        category: "company"
      - name: "Hugging Face"
        url: "https://huggingface.co/blog/feed.xml"
        category: "company"
      - name: "NVIDIA AI"
        url: "https://blogs.nvidia.com/feed/"
        category: "company"

  arxiv:
    enabled: true
    categories:
      - "cs.CL"   # Computation and Language (LLMs, NLP)
      - "cs.AI"   # Artificial Intelligence
      - "cs.LG"   # Machine Learning
      - "cs.MA"   # Multi-Agent Systems (AI Agents)
    max_results_per_category: 20

  github_trending:
    enabled: true
    languages:
      - "python"
      - "jupyter-notebook"
    since: "weekly"   # daily | weekly | monthly
    max_repos: 25

  reddit:
    enabled: false  # Phase 3+
  hackernews:
    enabled: false  # Phase 3+

collection:
  request_timeout_seconds: 15
  user_agent: "ai-news-agent/0.1 (personal intelligence newsletter; +https://github.com/yourname/ai-news-agent)"
  max_retries: 2
  retry_backoff_seconds: 2

newsletter:
  max_articles: 15

llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  # api key is read from the GEMINI_API_KEY environment variable, never stored here
  #
  # Fallback provider: if Gemini fails repeatedly in a single run (rate limit,
  # timeout, truncation), llm/router.py switches to Groq for the rest of that
  # run rather than falling all the way back to rule-based summaries.
  # Only used when GROQ_API_KEY is set — the pipeline works fine without it,
  # it just has one less fallback layer before rule-based summaries.
  #
  # openai/gpt-oss-120b, not llama-3.3-70b-versatile: Groq deprecated the
  # Llama model on 2026-06-17 and recommends this as the general-purpose
  # replacement. Check https://console.groq.com/docs/deprecations before
  # assuming this is still current.
  groq_model: "openai/gpt-oss-120b"
  # groq api key is read from the GROQ_API_KEY environment variable